<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Confirmed - Notesnook</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
        background: #ffffff;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        font-size: 16px;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .icon-wrapper {
        background: #e8f5e9;
        border-radius: 100px;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon-wrapper svg {
        width: 72px;
        height: 72px;
        fill: #008837;
      }

      .heading {
        font-size: 2.5em;
        font-weight: 700;
        text-align: center;
        margin-top: 20px;
        color: #000;
      }

      .subheading {
        font-size: 1.5em;
        font-weight: 600;
        text-align: center;
        margin-top: 8px;
        color: #5b5b5b;
      }

      .body-text {
        font-size: 1.2em;
        text-align: center;
        margin-top: 8px;
        color: #808080;
        word-wrap: break-word;
      }

      .footer {
        background: #f0f0f0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .footer-heading {
        font-size: 1.2em;
        font-weight: bold;
        text-align: center;
      }

      .footer-subtext {
        font-size: 1em;
        text-align: center;
        margin-top: 8px;
        color: #5b5b5b;
      }

      .social-icons {
        display: flex;
        gap: 8px;
        margin-top: 20px;
      }

      .social-icons a {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #5b5b5b;
        cursor: pointer;
        text-decoration: none;
      }

      .social-icons a:hover svg {
        opacity: 0.8;
      }

      .social-icons svg {
        width: 30px;
        height: 30px;
      }

      .promo-text {
        font-size: 0.85em;
        text-align: center;
        margin-top: 8px;
        color: #5b5b5b;
      }

      .promo-text .hashtag {
        font-weight: bold;
        color: #008837;
      }

      @media (max-width: 480px) {
        body {
          font-size: 14px;
        }
      }

      @media (min-width: 769px) {
        body {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="icon-wrapper">
        <!-- Mail Check Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path

          />
        </svg>
      </div>
      <h1 class="heading">Huzzah!</h1>
      <p class="subheading">{{subheading}}</p>
      <p class="body-text">
        Thank you for choosing end-to-end encrypted note taking. Now you can
        sync your notes to unlimited devices.
      </p>
    </div>

    <div class="footer">

      </div>
      <p class="promo-text">
        Use <span class="hashtag">#notesnook</span> and get a chance to win free

      </p>
    </div>
  </body>
</html>
