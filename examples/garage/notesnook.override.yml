services:
  notesnook-s3:
    profiles: [embedded-disabled]

  setup-s3:
    profiles: [embedded-disabled]

  notesnook-server:
    networks:
      - notesnook
      - notesnook-shared
    depends_on: !override
      identity-server:
        condition: service_started
    environment:
      S3_INTERNAL_SERVICE_URL: "http://notesnook-garage:3900"
      S3_ACCESS_KEY_ID: "${GARAGE_ACCESS_KEY_ID}"
      S3_ACCESS_KEY: "${GARAGE_ACCESS_KEY_SECRET}"

networks:
  notesnook-shared:
    external: true
